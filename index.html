<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=https://relimie.com/en/index.html">
    <link rel="canonical" href="https://relimie.com/en/index.html">
    <title>Relimie – Mindful Drinking Tracker for iPhone</title>
    <script>
        (function () {
            const userLang = navigator.language || navigator.userLanguage;
            const storedLang = localStorage.getItem('site_lang');
            let lang = storedLang || userLang.split('-')[0];
            if (!['en', 'de', 'ru'].includes(lang)) lang = 'en';

            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            // Replace with the default landing page for the detected language
            const targetPage = currentPage === '' || currentPage === 'index.html' ? 'index.html' : currentPage;
            window.location.replace(lang + '/' + targetPage + window.location.search + window.location.hash);
        })();
    </script>
</head>
<body></body>
</html>
