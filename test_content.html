<!DOCTYPE html>
<html>

<head>
    <script src="assets/js/content.js"></script>
</head>

<body>
    <pre id="out"></pre>
    <script>
        const out = document.getElementById('out');
        if (typeof siteContent === 'undefined') {
            out.innerText = 'Error: siteContent is undefined';
        } else {
            out.innerText = 'siteContent found!\n';
            out.innerText += 'Languages: ' + Object.keys(siteContent).join(', ') + '\n';
            for (let lang in siteContent) {
                out.innerText += '  - ' + lang + ': ' + Object.keys(siteContent[lang]).join(', ') + '\n';
            }
        }
    </script>
</body>

</html>
